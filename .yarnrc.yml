enableScripts: true

nodeLinker: node-modules

packageExtensions:
  '@chromatic-com/storybook@*':
    peerDependencies:
      react: '*'
      react-dom: '*'
    peerDependenciesMeta:
      react:
        optional: true
      react-dom:
        optional: true
  '@storybook/addon-docs@*':
    peerDependencies:
      '@types/react': '*'
    peerDependenciesMeta:
      '@types/react':
        optional: true
  '@storybook/addon-essentials@*':
    peerDependencies:
      '@types/react': '*'
    peerDependenciesMeta:
      '@types/react':
        optional: true
  '@storybook/core@*':
    peerDependencies:
      storybook: '*'
    peerDependenciesMeta:
      storybook:
        optional: true
  babel-plugin-styled-components@*:
    peerDependencies:
      '@babel/core': '*'
  styled-components@*:
    peerDependencies:
      '@babel/core': '*'
    peerDependenciesMeta:
      '@babel/core':
        optional: true
